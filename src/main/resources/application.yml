spring:
  application:
    name: ${SPRING_APP_NAME:radio-registry}

  profiles:
    active: ${PROFILE_ACTIVE:default}

  datasource:
    url: ${DB_URL}?currentSchema=${DB_SCHEMA}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:none}

    properties:
      hibernate:
        default_schema: ${HIBERNATE_DEFAULT_SCHEMA:radio_registry}
        format_sql: ${HIBERNATE_FORMAT_SQL:true}
        default_batch_fetch_size: ${HIBERNATE_DEFAULT_BATCH_FETCH_SIZE:20}

    show-sql: ${JPA_SHOW_SQL:true}

  data:
    web:
      pageable:
        default-page-size: ${DEFAULT_PAGE_SIZE:20}
        max-page-size: ${MAX_PAGE_SIZE:100}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        retries: 3

#  security:
#    user:
#      name: ${SECURITY_USERNAME}
#      password: ${SECURITY_PASSWORD}

management:
  endpoints:
    web:
      exposure:
        include: ${EXPOSURE_INCLUDE}

  endpoint:
    health:
      show-details: ${SHOW_DETAILS}

  metrics:
    tags:
      application: ${SPRING_APP_NAME:radio-registry}

logging:
  pattern:
    console: ${LOGPATTERN_CONSOLE:%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n}
  level:
    org:
      springframework:
        security: ${SPRING_SECURITY_LOG_LEVEL:TRACE}

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/v1

outbox:
  retention:
    days: 30
  publisher:
    fixed-delay: 5000
    max-retries: 3
  cleanup:
    cron: "0 0 3 * * *"