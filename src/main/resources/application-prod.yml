spring:
  config:
    activate:
      on-profile: prod

  jpa:
    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:false}

    show-sql: ${JPA_SHOW_SQL:false}

logging:
  level:
    org:
      springframework:
        security: ${SPRING_SECURITY_LOG_LEVEL:ERROR}

server:
  port: ${SERVER_PORT:8443}
  ssl:
    enabled: true
    key-store: "file:${SSL_KEYSTORE_PATH:./radio-registry/certs/keystore.p12}"
    key-store-password: "${SSL_KEYSTORE_PASSWORD}"
    key-store-type: PKCS12
    key-alias: "radio-registry"