name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests?'
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-south-1
  ECR_REPOSITORY: radio-registry

jobs:
  test:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run tests
        run: ./gradlew test

  build-and-push:
    needs: test
    if: |
      always() &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::643297135589:role/github-actions-radio-registry
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        run: |
          REGISTRY=${{ steps.ecr-login.outputs.registry }}
          ./gradlew bootBuildImage --imageName=$REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          docker tag $REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.sha }} $REGISTRY/${{ env.ECR_REPOSITORY }}:latest
          docker push $REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          docker push $REGISTRY/${{ env.ECR_REPOSITORY }}:latest

      - name: Trigger radio-infra deploy
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.INFRA_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/giuliopetteno/radio-infra/dispatches \
            -d '{"event_type":"deploy"}'
